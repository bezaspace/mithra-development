services:
  - type: web
    name: raksha-backend
    runtime: python
    repo: https://github.com/bezaspace/mithra-development.git
    rootDir: "back end"
    plan: free
    region: oregon
    autoDeployTrigger: off
    buildCommand: pip install uv && uv sync --frozen
    startCommand: .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_NAME
        value: raksha
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-live-preview
      - key: FRONTEND_ORIGIN
        value: https://mithra-kappa.vercel.app
      - key: LOG_LEVEL
        value: info
      - key: GEMINI_API_KEY
        sync: false
